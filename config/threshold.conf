[threshold]
# CPU使用率告警阈值（百分比）
cpu_warn=70
cpu_crit=85

# 内存使用率告警阈值（百分比）
mem_warn=75
mem_crit=90

# 磁盘使用率告警阈值（百分比）
disk_warn=80
disk_crit=95

# Pod重启次数告警阈值
pod_restart_warn=3
pod_restart_crit=10

# ERROR日志数量告警阈值（每小时）
error_per_hour_warn=10
error_per_hour_crit=50

[notification]
# Webhook地址（飞书/钉钉/企业微信），留空则不发送
webhook_url=""

# 告警级别：warn=只发警告以上，crit=只发严重告警
alert_level="warn"

[k8s]
# 需要监控的命名空间，逗号分隔，留空则监控所有
namespaces="default"
