version: '3.8'

services:
  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis-data:/data

  flask:
    build:
      context: ../app
      dockerfile: ../docker/Dockerfile
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile.nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - flask

volumes:
  redis-data:
